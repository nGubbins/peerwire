<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Peerwire Chat</title>
<style>
:root {
  --bg: #111;
  --surface: #1e1e1e;
  --surface-raised: #252525;
  --surface-input: #2a2a2a;
  --border: #333;
  --border-input: #444;
  --text: #e0e0e0;
  --text-secondary: #999;
  --text-muted: #666;
  --text-dim: #555;
  --accent: #1a73e8;
  --accent-hover: #2563eb;
  --accent-bg: #1a2a4a;
  --accent-fg: #4a9eff;
  --hover: #282828;
  --active: #1a2a4a;
  --bubble-bg: #2a2a2a;
  --bubble-text: #e0e0e0;
  --bubble-border: #333;
  --status-ok-bg: #1a3a1f;
  --status-ok: #4caf50;
  --status-warn-bg: #3a2a00;
  --status-warn: #ffa726;
  --status-err-bg: #3a1a1a;
  --status-err: #ef5350;
  --err: #ef5350;
}
[data-theme="light"] {
  --bg: #f0f0ef;
  --surface: #fff;
  --surface-raised: #fafafa;
  --surface-input: #f7f7f7;
  --border: #e8e8e8;
  --border-input: #ddd;
  --text: #222;
  --text-secondary: #999;
  --text-muted: #666;
  --text-dim: #bbb;
  --accent: #1a73e8;
  --accent-hover: #1557b0;
  --accent-bg: #e8f0fe;
  --accent-fg: #1a73e8;
  --hover: #f7f7f7;
  --active: #e8f0fe;
  --bubble-bg: #f1f3f4;
  --bubble-text: #222;
  --bubble-border: #e8e8e8;
  --status-ok-bg: #e6f4ea;
  --status-ok: #2e7d32;
  --status-warn-bg: #fff8e1;
  --status-warn: #f57c00;
  --status-err-bg: #fce8e6;
  --status-err: #c62828;
  --err: #d32f2f;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;}
#app{display:flex;flex-direction:column;height:620px;width:720px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:0 2px 20px rgba(0,0,0,0.3);}

/* id bar */
#id-bar{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface-raised);}
#id-bar-label{font-size:11px;color:var(--text-muted);}
#my-id{font-size:12px;font-weight:600;color:var(--text);font-family:monospace;letter-spacing:0.5px;}
#copy-btn{font-size:11px;color:var(--text-secondary);cursor:pointer;padding:2px 7px;border:1px solid var(--border-input);border-radius:6px;background:var(--surface-input);}
#copy-btn:hover{background:var(--hover);}
#theme-btn{margin-left:auto;background:none;border:none;cursor:pointer;padding:3px 5px;color:var(--text-muted);border-radius:6px;display:flex;align-items:center;}
#theme-btn:hover{color:var(--text);background:var(--hover);}
#conn-status{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500;}
#conn-status.connected{background:var(--status-ok-bg);color:var(--status-ok);}
#conn-status.connecting{background:var(--status-warn-bg);color:var(--status-warn);}
#conn-status.disconnected{background:var(--status-err-bg);color:var(--status-err);}

/* server config bar */
#server-bar{display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border);background:var(--surface-raised);flex-shrink:0;}
#server-bar label{font-size:11px;color:var(--text-muted);white-space:nowrap;}
#server-input{flex:1;font-size:12px;padding:4px 8px;border:1px solid var(--border-input);border-radius:6px;background:var(--surface-input);color:var(--text);font-family:monospace;outline:none;}
#server-input:focus{border-color:var(--text-muted);}
#connect-btn{font-size:12px;padding:4px 12px;border:1px solid var(--border-input);border-radius:6px;background:var(--surface-input);color:var(--text-secondary);cursor:pointer;white-space:nowrap;}
#connect-btn:hover{background:var(--hover);}

/* tabs */
#top-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.top-tab{padding:9px 18px;font-size:13px;cursor:pointer;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;white-space:nowrap;}
.top-tab.on{color:var(--text);font-weight:500;border-bottom:2px solid var(--text);}

/* chats view */
#view-chats{display:flex;flex:1;min-height:0;}
#view-contacts{display:none;flex:1;flex-direction:column;min-height:0;}

/* sidebar */
#sidebar{width:230px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#sort-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1px solid var(--border);}
#sort-bar label{font-size:11px;color:var(--text-muted);}
#sort-sel{font-size:11px;padding:3px 6px;border:1px solid var(--border-input);border-radius:6px;background:var(--surface-raised);color:var(--text-secondary);cursor:pointer;}
#chat-list{flex:1;overflow-y:auto;}
.chat-row{padding:10px 12px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.chat-row:hover{background:var(--hover);}
.chat-row.active{background:var(--active);}
.dot{width:8px;height:8px;border-radius:50%;background:var(--text-dim);flex-shrink:0;}
.chat-row.active .dot{background:var(--accent-fg);}
.item-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:11px;color:var(--text-muted);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unread{margin-left:auto;background:var(--accent-bg);color:var(--accent-fg);font-size:11px;font-weight:600;border-radius:10px;padding:1px 7px;flex-shrink:0;}

/* main chat */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#chat-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;background:var(--surface-raised);}
#chat-title{font-size:14px;font-weight:600;color:var(--text);}
#chat-sub{font-size:11px;color:var(--text-muted);font-family:monospace;}
#messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:6px;background:var(--surface);}
.msg-row{display:flex;flex-direction:column;max-width:75%;}
.msg-row.mine{align-self:flex-end;align-items:flex-end;}
.msg-row.theirs{align-self:flex-start;align-items:flex-start;}
.bubble{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.5;word-break:break-word;cursor:pointer;transition:opacity .1s;}
.bubble:hover{opacity:.82;}
.mine .bubble{background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.theirs .bubble{background:var(--bubble-bg);color:var(--bubble-text);border-bottom-left-radius:4px;border:1px solid var(--bubble-border);}
.msg-meta{font-size:10px;color:var(--text-dim);margin-top:2px;}
.part-note{font-size:10px;color:var(--text-dim);align-self:center;margin:2px 0;}
.sys-note{font-size:11px;color:var(--text-muted);align-self:center;background:var(--surface-raised);padding:3px 10px;border-radius:8px;margin:4px 0;}
#inp-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;}
#msg-inp{flex:1;font-size:13px;padding:8px 12px;border:1px solid var(--border-input);border-radius:18px;background:var(--surface-raised);color:var(--text);resize:none;font-family:system-ui,sans-serif;line-height:1.4;max-height:100px;overflow-y:auto;outline:none;}
#msg-inp:focus{border-color:var(--text-muted);background:var(--surface-input);}
#send-btn{padding:8px 16px;border:none;border-radius:18px;background:var(--accent);color:#fff;cursor:pointer;font-size:13px;font-weight:500;}
#send-btn:hover{background:var(--accent-hover);}
#send-btn:disabled{background:var(--border-input);cursor:default;}
#chat-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:var(--text-dim);font-size:13px;}

/* contacts view */
#contacts-toolbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
#contacts-count{font-size:12px;color:var(--text-muted);}
#contacts-list{flex:1;overflow-y:auto;}
.contact-card{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);}
.contact-card:hover{background:var(--hover);}
.c-info{flex:1;min-width:0;}
.c-name{font-size:14px;font-weight:500;color:var(--text);}
.c-id{font-size:11px;color:var(--text-muted);font-family:monospace;margin-top:2px;}
.c-created{font-size:11px;color:var(--text-dim);margin-top:2px;}
.c-actions{display:flex;gap:6px;flex-shrink:0;}

/* modals */
.overlay-bg{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:20;border-radius:12px;}
.modal{background:var(--surface-raised);border-radius:12px;border:1px solid var(--border-input);padding:22px;width:310px;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
.modal h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:14px;}
.modal label{font-size:12px;color:var(--text-muted);display:block;margin-bottom:4px;}
.modal input{width:100%;font-size:13px;padding:8px 10px;border:1px solid var(--border-input);border-radius:8px;background:var(--surface-input);color:var(--text);margin-bottom:12px;outline:none;}
.modal input:focus{border-color:var(--text-muted);}
.modal input:disabled{color:var(--text-dim);cursor:default;}
.modal-meta{font-size:11px;color:var(--text-dim);margin-bottom:14px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.modal-btns button{font-size:13px;padding:7px 16px;border:1px solid var(--border-input);border-radius:8px;background:var(--surface-input);color:var(--text-secondary);cursor:pointer;}
.modal-btns button:hover{background:var(--hover);}
.modal-btns button.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.modal-btns button.primary:hover{background:var(--accent-hover);}
#err{font-size:11px;color:var(--err);min-height:16px;}
.icon-btn{background:none;border:none;cursor:pointer;padding:5px;color:var(--text-dim);border-radius:6px;display:flex;align-items:center;}
.icon-btn:hover{color:var(--text-secondary);background:var(--hover);}
.ts-modal{background:var(--surface-raised);border-radius:12px;border:1px solid var(--border-input);padding:20px;width:290px;box-shadow:0 4px 24px rgba(0,0,0,0.4);}
.ts-dir{font-size:11px;color:var(--text-muted);margin-bottom:10px;}
.ts-msg-preview{font-size:13px;color:var(--text-secondary);line-height:1.5;margin-bottom:14px;word-break:break-word;padding:8px 10px;background:var(--surface-input);border-radius:8px;}
.ts-row{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;}
.ts-label{font-size:11px;color:var(--text-muted);width:52px;flex-shrink:0;}
.ts-val{font-size:13px;color:var(--text);font-family:monospace;}

/* utility classes for JS-generated elements */
.add-btn-dashed{width:100%;font-size:12px;padding:6px;border:1px dashed var(--border-input);border-radius:8px;background:none;color:var(--text-dim);cursor:pointer;}
.add-btn-dashed:hover{background:var(--hover);color:var(--text-secondary);}
.add-contact-btn{font-size:12px;padding:5px 14px;border:1px solid var(--border-input);border-radius:8px;background:var(--surface-input);color:var(--text-secondary);cursor:pointer;}
.add-contact-btn:hover{background:var(--hover);}
.echo-label{margin-left:auto;font-size:11px;color:var(--text-dim);padding-right:4px;}
</style>
</head>
<body>
<div id="app">
  <div id="id-bar">
    <span id="id-bar-label">your id</span>
    <span id="my-id"></span>
    <button id="copy-btn">copy</button>
    <button id="theme-btn" title="toggle theme"></button>
    <span id="conn-status" class="disconnected">disconnected</span>
  </div>
  <div id="server-bar">
    <label>relay server</label>
    <input id="server-input" value="ws://localhost:8765" placeholder="ws://host:8765" />
    <button id="connect-btn" onclick="connectWS()">connect</button>
  </div>
  <div id="top-tabs">
    <button class="top-tab on" id="tab-chats" onclick="switchTab('chats')">chats</button>
    <button class="top-tab" id="tab-contacts" onclick="switchTab('contacts')">contacts</button>
  </div>

  <div id="view-chats">
    <div id="sidebar">
      <div id="sort-bar">
        <label>sort</label>
        <select id="sort-sel" onchange="renderChatList()">
          <option value="recent">most recent</option>
          <option value="alpha">name A–Z</option>
          <option value="started">date started</option>
        </select>
      </div>
      <div id="chat-list"></div>
    </div>
    <div id="main">
      <div id="chat-empty">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>select a chat to start</span>
      </div>
    </div>
  </div>

  <div id="view-contacts">
    <div id="contacts-toolbar">
      <span id="contacts-count"></span>
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="err"></span>
        <button onclick="openAddModal()" class="add-contact-btn">+ add</button>
      </div>
    </div>
    <div id="contacts-list"></div>
  </div>
</div>

<script>
const CHUNK = 160;
const ECHO_ID = 'ECHO-BOT-000';
const ECHO_LIMIT = 10;
let modal = null;
let ws = null;
let wsConnected = false;

function genId() {
  return Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).slice(2,7).toUpperCase();
}
function decodeIdTs(id) {
  try { const ms = parseInt(id.split('-')[0], 36); return isNaN(ms) ? null : new Date(ms); } catch(e) { return null; }
}
function splitMsg(t) {
  const p = []; for (let i = 0; i < t.length; i += CHUNK) p.push(t.slice(i, i + CHUNK)); return p;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function fmtShort(d) { return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
function fmtFull(d) {
  return {
    date: d.toLocaleDateString([], {weekday:'long', year:'numeric', month:'long', day:'numeric'}),
    time: d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'}),
    iso: d.toISOString(),
    unix: Math.floor(d.getTime() / 1000)
  };
}

const myId = genId();
const S = { contacts: {}, messages: {}, active: null, tab: 'chats' };

S.contacts[ECHO_ID] = { id: ECHO_ID, name: 'Echo', started: Date.now(), isEcho: true };
S.messages[ECHO_ID] = [];

document.getElementById('my-id').textContent = myId;
document.getElementById('copy-btn').onclick = () => {
  navigator.clipboard.writeText(myId).catch(() => {});
  const b = document.getElementById('copy-btn');
  b.textContent = 'copied!'; setTimeout(() => b.textContent = 'copy', 1400);
};

// ── Theme ──────────────────────────────────────────────
const ICON_SUN = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>`;
const ICON_MOON = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

function isDarkMode() {
  return document.documentElement.getAttribute('data-theme') !== 'light';
}
function updateThemeIcon() {
  document.getElementById('theme-btn').innerHTML = isDarkMode() ? ICON_SUN : ICON_MOON;
}
function toggleTheme() {
  const nowLight = !isDarkMode();
  document.documentElement.setAttribute('data-theme', nowLight ? 'light' : 'dark');
  localStorage.setItem('theme', nowLight ? 'light' : 'dark');
  updateThemeIcon();
}

const _savedTheme = localStorage.getItem('theme');
document.documentElement.setAttribute('data-theme', _savedTheme === 'light' ? 'light' : 'dark');
document.getElementById('theme-btn').onclick = toggleTheme;
updateThemeIcon();

// ── WebSocket ──────────────────────────────────────────
function setStatus(state) {
  const el = document.getElementById('conn-status');
  el.className = 'conn-status ' + state;
  el.textContent = state;
  const btn = document.getElementById('connect-btn');
  if (state === 'connected') {
    btn.textContent = 'disconnect';
    btn.onclick = disconnectWS;
  } else {
    btn.textContent = state === 'connecting' ? 'connecting…' : 'connect';
    btn.onclick = connectWS;
  }
}

function disconnectWS() {
  if (ws) { ws.close(); ws = null; }
  wsConnected = false;
  setStatus('disconnected');
}

function connectWS() {
  const url = document.getElementById('server-input').value.trim();
  if (ws) { ws.close(); ws = null; }
  setStatus('connecting');
  try { ws = new WebSocket(url); } catch(e) { setStatus('disconnected'); return; }

  ws.onopen = () => {
    wsConnected = true;
    setStatus('connected');
    ws.send(JSON.stringify({ type: 'register', id: myId }));
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === 'message') {
      const from = msg.from;
      if (!S.contacts[from]) {
        S.contacts[from] = { id: from, name: 'peer ' + from.slice(0,6).toLowerCase(), started: Date.now() };
        S.messages[from] = [];
      }
      const t = fmtShort(new Date(msg.stamp || Date.now()));
      S.messages[from].push({
        text: msg.text, mine: false, time: t, stamp: msg.stamp || Date.now(),
        read: S.active === from, part: msg.part || 1, parts: msg.parts || 1
      });
      if (S.active === from) renderChatKeepDraft();
      renderChatList();
    }

    if (msg.type === 'error' && msg.code === 'offline') {
      addSysNote(msg.to, `${msg.to} is offline — message not delivered`);
    }
  };

  ws.onclose = () => { wsConnected = false; ws = null; setStatus('disconnected'); };
  ws.onerror = () => { wsConnected = false; setStatus('disconnected'); };
}

document.getElementById('connect-btn').onclick = connectWS;
document.getElementById('server-input').addEventListener('keydown', e => { if (e.key === 'Enter') connectWS(); });

function sendWS(payload) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify(payload));
}

function addSysNote(contactId, text) {
  if (!S.messages[contactId]) return;
  const now = Date.now();
  S.messages[contactId].push({ text, mine: false, time: fmtShort(new Date(now)), stamp: now, part: 1, parts: 1, sys: true, read: S.active === contactId });
  if (S.active === contactId) renderChatKeepDraft();
}

// ── Modals ─────────────────────────────────────────────
function showOverlay(html) {
  closeModal();
  modal = document.createElement('div');
  modal.className = 'overlay-bg';
  modal.innerHTML = html;
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.getElementById('app').appendChild(modal);
  modal.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
}
function closeModal() { if (modal) { modal.remove(); modal = null; } }

function openTsModal(m) {
  const f = fmtFull(new Date(m.stamp));
  showOverlay(`<div class="ts-modal">
    <div class="ts-dir">${m.mine ? 'sent' : 'received'} · part ${m.part} of ${m.parts}</div>
    <div class="ts-msg-preview">${esc(m.text)}</div>
    <div class="ts-row"><span class="ts-label">date</span><span class="ts-val">${f.date}</span></div>
    <div class="ts-row"><span class="ts-label">time</span><span class="ts-val">${f.time}</span></div>
    <div class="ts-row"><span class="ts-label">ISO</span><span class="ts-val" style="font-size:11px;">${f.iso}</span></div>
    <div class="ts-row"><span class="ts-label">unix</span><span class="ts-val">${f.unix}</span></div>
    <div class="modal-btns" style="margin-top:14px;"><button onclick="closeModal()">close</button></div>
  </div>`);
}

function openAddModal() {
  showOverlay(`<div class="modal">
    <h3>add contact</h3>
    <label>peer ID</label>
    <input id="m-id" placeholder="e.g. LY7K4A2-F3QXR" style="font-family:monospace;font-size:12px;" />
    <label>nickname</label>
    <input id="m-nick" placeholder="e.g. Alice" maxlength="30" />
    <div class="modal-btns">
      <button onclick="closeModal()">cancel</button>
      <button class="primary" onclick="confirmAdd()">add</button>
    </div>
  </div>`);
  setTimeout(() => document.getElementById('m-id') && document.getElementById('m-id').focus(), 50);
}

function openEditModal(id) {
  const c = S.contacts[id];
  const created = decodeIdTs(id);
  const createdStr = c.isEcho ? 'system contact' : created ? created.toLocaleDateString([], {year:'numeric',month:'short',day:'numeric'}) + ' ' + created.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : 'unknown';
  showOverlay(`<div class="modal">
    <h3>${c.isEcho ? 'Echo' : 'edit contact'}</h3>
    <label>nickname</label>
    <input id="m-nick" value="${esc(c.name)}" maxlength="30" ${c.isEcho ? 'disabled' : ''} />
    <div class="modal-meta">ID created: ${createdStr}${c.isEcho ? ' · system contact' : ''}</div>
    <div class="modal-btns">
      <button onclick="closeModal()">${c.isEcho ? 'close' : 'cancel'}</button>
      ${!c.isEcho ? `<button class="primary" onclick="confirmEdit('${id}')">save</button>` : ''}
    </div>
  </div>`);
  setTimeout(() => { const n = document.getElementById('m-nick'); if (n && !c.isEcho) { n.focus(); n.select(); } }, 50);
}

function showErr(m) { const e = document.getElementById('err'); if (!e) return; e.textContent = m; setTimeout(() => e.textContent = '', 2200); }

function confirmAdd() {
  const idEl = document.getElementById('m-id'), nickEl = document.getElementById('m-nick');
  if (!idEl || !nickEl) return;
  const clean = idEl.value.trim().toUpperCase().replace(/[^A-Z0-9\-]/g, '');
  const nick = nickEl.value.trim() || ('peer ' + clean.slice(0,6).toLowerCase());
  if (!clean) { showErr('enter an ID'); return; }
  if (clean === myId) { showErr("that's your own ID"); closeModal(); return; }
  if (S.contacts[clean]) { showErr('already added'); closeModal(); return; }
  closeModal();
  S.contacts[clean] = { id: clean, name: nick, started: Date.now() };
  S.messages[clean] = [];
  renderContactsList(); renderChatList();
}

function confirmEdit(id) {
  const nickEl = document.getElementById('m-nick');
  if (!nickEl) return;
  const nick = nickEl.value.trim();
  if (nick) S.contacts[id].name = nick;
  closeModal(); renderContactsList(); renderChatList();
  if (S.active === id) renderChatKeepDraft();
}

// ── Tab switching ──────────────────────────────────────
function switchTab(t) {
  S.tab = t;
  document.getElementById('tab-chats').className = 'top-tab' + (t === 'chats' ? ' on' : '');
  document.getElementById('tab-contacts').className = 'top-tab' + (t === 'contacts' ? ' on' : '');
  document.getElementById('view-chats').style.display = t === 'chats' ? 'flex' : 'none';
  document.getElementById('view-contacts').style.display = t === 'contacts' ? 'flex' : 'none';
  if (t === 'contacts') renderContactsList();
}

// ── Chat list ──────────────────────────────────────────
function getSorted(mode) {
  const list = Object.values(S.contacts);
  if (mode === 'alpha') return list.sort((a,b) => a.name.localeCompare(b.name));
  if (mode === 'started') return list.sort((a,b) => a.started - b.started);
  return list.sort((a,b) => {
    const la = S.messages[a.id], lb = S.messages[b.id];
    const ta = la && la.length ? la[la.length-1].stamp : a.started;
    const tb = lb && lb.length ? lb[lb.length-1].stamp : b.started;
    return tb - ta;
  });
}

function renderChatList() {
  const area = document.getElementById('chat-list');
  area.innerHTML = '';
  const sel = document.getElementById('sort-sel');
  getSorted(sel ? sel.value : 'recent').forEach(c => {
    const unread = (S.messages[c.id] || []).filter(m => !m.mine && !m.read).length;
    const el = document.createElement('div');
    el.className = 'chat-row' + (S.active === c.id ? ' active' : '');
    el.innerHTML = `<div class="dot"></div>
      <div style="min-width:0;flex:1;">
        <div class="item-name">${esc(c.name)}</div>
        <div class="item-sub">${esc(c.id)}</div>
      </div>
      ${unread ? `<span class="unread">${unread}</span>` : ''}`;
    el.onclick = () => selectChat(c.id);
    area.appendChild(el);
  });
  const add = document.createElement('div');
  add.style.cssText = 'padding:10px 12px;';
  add.innerHTML = `<button class="add-btn-dashed" onclick="openAddModal()">+ add</button>`;
  area.appendChild(add);
}

// ── Contacts list ──────────────────────────────────────
function renderContactsList() {
  const list = document.getElementById('contacts-list');
  const countEl = document.getElementById('contacts-count');
  const all = Object.values(S.contacts).sort((a,b) => a.name.localeCompare(b.name));
  if (countEl) countEl.textContent = `${all.length} contact${all.length !== 1 ? 's' : ''}`;
  list.innerHTML = '';
  all.forEach(c => {
    const created = decodeIdTs(c.id);
    const createdStr = c.isEcho ? 'system contact' : created ? created.toLocaleDateString([], {year:'numeric',month:'short',day:'numeric'}) : 'unknown';
    const el = document.createElement('div');
    el.className = 'contact-card';
    el.innerHTML = `<div class="c-info">
        <div class="c-name">${esc(c.name)}</div>
        <div class="c-id">${esc(c.id)}</div>
        <div class="c-created">created ${createdStr}</div>
      </div>
      <div class="c-actions">
        ${!c.isEcho ? `<button class="icon-btn" title="edit" onclick="openEditModal('${c.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>` : ''}
        <button class="icon-btn" title="open chat" onclick="switchTab('chats');selectChat('${c.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
      </div>`;
    list.appendChild(el);
  });
}

// ── Chat ───────────────────────────────────────────────
function selectChat(id) {
  S.active = id;
  switchTab('chats');
  (S.messages[id] || []).forEach(m => m.read = true);
  renderChatList(); renderChat();
}

function renderChatKeepDraft() {
  const inp = document.getElementById('msg-inp');
  const draft = inp ? inp.value : '';
  const focused = inp && document.activeElement === inp;
  renderChat();
  const newInp = document.getElementById('msg-inp');
  if (newInp && draft) {
    newInp.value = draft;
    newInp.style.height = 'auto';
    newInp.style.height = Math.min(newInp.scrollHeight, 100) + 'px';
  }
  if (newInp && focused) newInp.focus();
}

function renderChat() {
  const c = S.contacts[S.active]; if (!c) return;
  const main = document.getElementById('main');
  main.innerHTML = `
    <div id="chat-header">
      <div><div id="chat-title">${esc(c.name)}</div><div id="chat-sub">${esc(c.id)}</div></div>
      ${!c.isEcho ? `<button class="icon-btn" style="margin-left:auto;" title="edit nickname" onclick="openEditModal('${c.id}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>` : '<div class="echo-label">echo bot</div>'}
    </div>
    <div id="messages"></div>
    <div id="inp-row">
      <textarea id="msg-inp" placeholder="type a message…" rows="1"></textarea>
      <button id="send-btn">send</button>
    </div>`;

  const msgsEl = document.getElementById('messages');
  (S.messages[S.active] || []).forEach(m => {
    if (m.sys) {
      const n = document.createElement('div'); n.className = 'sys-note'; n.textContent = m.text;
      msgsEl.appendChild(n); return;
    }
    if (m.parts > 1) {
      const n = document.createElement('div'); n.className = 'part-note';
      n.textContent = `part ${m.part} of ${m.parts}`; msgsEl.appendChild(n);
    }
    const r = document.createElement('div');
    r.className = 'msg-row ' + (m.mine ? 'mine' : 'theirs');
    r.innerHTML = `<div class="bubble" title="click to inspect">${esc(m.text)}</div><div class="msg-meta">${m.time}</div>`;
    r.querySelector('.bubble').addEventListener('click', () => openTsModal(m));
    msgsEl.appendChild(r);
  });
  msgsEl.scrollTop = msgsEl.scrollHeight;

  const inp = document.getElementById('msg-inp');
  inp.addEventListener('input', () => { inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 100) + 'px'; });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
  document.getElementById('send-btn').onclick = doSend;
}

// ── Sending ────────────────────────────────────────────
function doSend() {
  const inp = document.getElementById('msg-inp');
  const text = inp && inp.value.trim();
  if (!text || !S.active) return;
  const chunks = splitMsg(text);
  const now = Date.now(); const t = fmtShort(new Date(now));
  chunks.forEach((ch, i) => {
    S.messages[S.active].push({ text: ch, mine: true, time: t, stamp: now, read: true, part: i+1, parts: chunks.length });
  });
  inp.value = ''; inp.style.height = 'auto';
  renderChat(); renderChatList();
  document.getElementById('msg-inp').focus();

  const c = S.contacts[S.active];
  if (c.isEcho) {
    doEchoReply(S.active, chunks);
  } else {
    chunks.forEach((ch, i) => {
      sendWS({ type: 'message', to: S.active, text: ch, part: i+1, parts: chunks.length, stamp: now });
    });
    if (!wsConnected) addSysNote(S.active, 'not connected to relay — message not sent');
  }
}

function doEchoReply(id, chunks) {
  const allowed = chunks.slice(0, ECHO_LIMIT);
  allowed.forEach((ch, i) => {
    setTimeout(() => {
      const now = Date.now(); const t = fmtShort(new Date(now));
      S.messages[id].push({ text: ch, mine: false, time: t, stamp: now, read: S.active === id, part: i+1, parts: allowed.length });
      if (S.active === id) renderChatKeepDraft();
      renderChatList();
    }, 400 + i * 300);
  });
  if (chunks.length > ECHO_LIMIT) {
    setTimeout(() => {
      const now = Date.now(); const t = fmtShort(new Date(now));
      S.messages[id].push({ text: `(${chunks.length - ECHO_LIMIT} part${chunks.length - ECHO_LIMIT > 1 ? 's' : ''} dropped — limit is ${ECHO_LIMIT})`, mine: false, time: t, stamp: now, read: S.active === id, part: 1, parts: 1 });
      if (S.active === id) renderChatKeepDraft();
      renderChatList();
    }, 400 + ECHO_LIMIT * 300 + 200);
  }
}

// ── Init ───────────────────────────────────────────────
switchTab('chats');
renderChatList();

const _relayParam = new URLSearchParams(location.search).get('relay');
if (_relayParam) {
  document.getElementById('server-input').value = _relayParam;
  connectWS();
}
</script>
